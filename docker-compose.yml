services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sga_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sga_pass_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sga_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_pass_dev}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
